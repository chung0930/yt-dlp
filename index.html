<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termux yt-dlp 遠端控制中心 v3.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f1f5f9; font-family: 'Segoe UI', 'Noto Sans TC', sans-serif; }
        .container { max-width: 1000px; margin-top: 30px; margin-bottom: 50px; }
        .nav-pills .nav-link { border-radius: 12px; font-weight: 700; color: #64748b; padding: 12px 25px; transition: all 0.3s; }
        .nav-pills .nav-link.active { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2); }
        .card { border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: none; overflow: hidden; }
        .card-header { background: #ffffff; border-bottom: 1px solid #f1f5f9; color: #1e293b; font-weight: 800; text-align: center; font-size: 1.5rem; padding: 25px; }
        .card-body { padding: 35px; background: white; }
        .form-label { font-weight: 700; color: #475569; margin-bottom: 8px; }
        .form-control, .form-select { border-radius: 14px; border: 2px solid #f1f5f9; padding: 12px 18px; transition: all 0.3s; background-color: #f8fafc; }
        .form-control:focus, .form-select:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); background-color: white; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); border: none; border-radius: 14px; padding: 15px; font-weight: 800; font-size: 1.1rem; transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        #login-section { display: block; }
        #main-content { display: none; }
        .task-item { border: 2px solid #f1f5f9; border-radius: 20px; padding: 25px; margin-top: 20px; background: white; transition: all 0.3s; }
        .progress { height: 24px; border-radius: 12px; background-color: #f1f5f9; overflow: hidden; margin-top: 15px; }
        .progress-bar { background: linear-gradient(90deg, #3b82f6, #8b5cf6); font-weight: 800; }
        .terminal-container { background: #0f172a; border-radius: 20px; height: 500px; width: 100%; border: none; overflow: hidden; position: relative; }
        .terminal-iframe { width: 100%; height: 100%; border: none; }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 30px; font-size: 0.85rem; background: #dcfce7; color: #166534; font-weight: 700; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登入介面 -->
        <div id="login-section" class="card mx-auto" style="max-width: 500px;">
            <div class="card-header">🔐 控制中心登入</div>
            <div class="card-body">
                <div class="mb-4">
                    <label class="form-label">管理員帳號</label>
                    <input type="text" id="username" class="form-control" placeholder="輸入帳號">
                </div>
                <div class="mb-4">
                    <label class="form-label">存取密碼</label>
                    <input type="password" id="password" class="form-control" placeholder="輸入密碼">
                </div>
                <button onclick="login()" class="btn btn-primary w-100">驗證身分</button>
            </div>
        </div>

        <!-- 主內容介面 -->
        <div id="main-content">
            <div class="d-flex justify-content-center mb-4">
                <ul class="nav nav-pills" id="pills-tab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="pills-download-tab" data-bs-toggle="pill" data-bs-target="#pills-download" type="button" role="tab"><i class="bi bi-cloud-arrow-down-fill me-2"></i>下載任務</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="pills-terminal-tab" data-bs-toggle="pill" data-bs-target="#pills-terminal" type="button" role="tab"><i class="bi bi-terminal-fill me-2"></i>遠端控制台</button>
                    </li>
                </ul>
            </div>

            <div class="tab-content" id="pills-tabContent">
                <!-- 下載分頁 -->
                <div class="tab-pane fade show active" id="pills-download" role="tabpanel">
                    <div class="card">
                        <div class="card-header">📥 影音下載任務管理</div>
                        <div class="card-body">
                            <div class="status-badge"><i class="bi bi-check-circle-fill me-1"></i> 後端已連線 (v3.0 Control Center)</div>
                            
                            <div class="mb-4">
                                <label class="form-label">後端伺服器 URL (Serveo)</label>
                                <input type="text" id="server-url" class="form-control" placeholder="https://xxxx.serveo.net" onchange="updateTerminalUrl()">
                            </div>

                            <div class="mb-4">
                                <label class="form-label">影音連結 (支援多連結自動拆分)</label>
                                <textarea id="url" class="form-control" rows="3" placeholder="貼上 YouTube / YouTube Music 網址..."></textarea>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">下載模式設定</label>
                                <select id="mode" class="form-select">
                                    <option value="1">🎵 YT Music 專輯下載 (資料夾+1:1封面)</option>
                                    <option value="2">🎵 YT Music 單曲下載 (1:1封面+標籤)</option>
                                    <option value="3">🎵 YT Music 播放清單下載 (單一專輯)</option>
                                    <option value="4">🎬 YT 影片 1080p 下載 (音畫同步)</option>
                                    <option value="5">🎬 YT 影片播放清單下載 (1080p)</option>
                                </select>
                            </div>

                            <button onclick="startDownload()" class="btn btn-primary w-100 mb-3">啟動批次下載任務</button>
                            <div id="tasks-container"></div>
                        </div>
                    </div>
                </div>

                <!-- 終端機分頁 -->
                <div class="tab-pane fade" id="pills-terminal" role="tabpanel">
                    <div class="card">
                        <div class="card-header">💻 Termux 實時控制台</div>
                        <div class="card-body">
                            <div class="alert alert-info py-2 small mb-3">
                                <i class="bi bi-info-circle-fill me-2"></i>
                                提示：請先在 Termux 執行 <code>ttyd -p 8080 bash</code> 並使用 Serveo 轉發 8080 埠。
                            </div>
                            <div class="mb-3">
                                <label class="form-label">控制台 URL (Serveo 8080 轉發網址)</label>
                                <input type="text" id="terminal-url" class="form-control" placeholder="https://terminal-xxxx.serveo.net">
                            </div>
                            <button onclick="connectTerminal()" class="btn btn-dark w-100 mb-4"><i class="bi bi-plug-fill me-2"></i>連接控制台</button>
                            
                            <div class="terminal-container">
                                <iframe id="terminal-frame" class="terminal-iframe" src="about:blank"></iframe>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="users.js"></script>
    <script>
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const validUser = USERS.find(u => u.username === user && u.password === pass);
            if (validUser) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else { alert('身分驗證失敗'); }
        }

        function connectTerminal() {
            const url = document.getElementById('terminal-url').value.trim();
            if (url) {
                document.getElementById('terminal-frame').src = url;
            } else { alert('請輸入控制台 URL'); }
        }

        async function startDownload() {
            const serverUrl = document.getElementById('server-url').value.trim();
            const url = document.getElementById('url').value.trim();
            const mode = document.getElementById('mode').value;
            if (!serverUrl || !url) { alert('資訊不完整'); return; }

            try {
                const response = await fetch(`${serverUrl}/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, mode })
                });
                const data = await response.json();
                if (data.task_ids) {
                    data.task_ids.forEach(id => createTaskUI(id, serverUrl));
                    document.getElementById('url').value = '';
                }
            } catch (e) { alert('連線失敗: ' + e.message); }
        }

        function createTaskUI(taskId, serverUrl) {
            const container = document.getElementById('tasks-container');
            const taskDiv = document.createElement('div');
            taskDiv.className = 'task-item';
            taskDiv.id = `task-${taskId}`;
            taskDiv.innerHTML = `
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <strong class="text-truncate" style="max-width: 70%;">任務: ${taskId}</strong>
                    <span id="badge-${taskId}" class="badge bg-secondary">等待中</span>
                </div>
                <div class="progress">
                    <div id="bar-${taskId}" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%;">0%</div>
                </div>
                <div id="info-${taskId}" class="status-text text-center">正在同步...</div>
                <div id="result-${taskId}" class="mt-3" style="display: none;">
                    <a id="btn-${taskId}" class="btn btn-success w-100" style="background: #10b981; border: none; border-radius: 12px; font-weight: 800;">🎁 領取檔案</a>
                </div>
            `;
            container.prepend(taskDiv);
            startPolling(taskId, serverUrl);
        }

        function startPolling(taskId, serverUrl) {
            const pollInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${serverUrl}/status/${taskId}`);
                    const data = await response.json();
                    const bar = document.getElementById(`bar-${taskId}`);
                    const info = document.getElementById(`info-${taskId}`);
                    const badge = document.getElementById(`badge-${taskId}`);

                    if (data.status === 'processing') {
                        const p = parseFloat(data.progress || 0).toFixed(1);
                        bar.style.width = p + '%';
                        bar.innerText = p + '%';
                        info.innerText = `⚡ ${data.speed || '--'} | ⏳ ${data.eta || '--'}`;
                        badge.className = 'badge bg-primary'; badge.innerText = '下載中';
                    } else if (data.status === 'completed') {
                        clearInterval(pollInterval);
                        bar.style.width = '100%'; bar.innerText = '100%';
                        info.innerText = '✅ 完成！';
                        badge.className = 'badge bg-success';
                        document.getElementById(`result-${taskId}`).style.display = 'block';
                        document.getElementById(`btn-${taskId}`).href = `${serverUrl}/files/${encodeURIComponent(data.file)}`;
                    } else if (data.status === 'failed') {
                        clearInterval(pollInterval);
                        info.innerText = '❌ 失敗: ' + (data.error || '未知錯誤');
                        badge.className = 'badge bg-danger';
                    }
                } catch (e) {}
            }, 2000);
        }
    </script>
</body>
</html>
