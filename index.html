<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termux yt-dlp 終極下載器 v2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', 'Noto Sans TC', sans-serif; }
        .container { max-width: 850px; margin-top: 40px; margin-bottom: 40px; }
        .card { border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: none; overflow: hidden; }
        .card-header { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; border: none; font-weight: 800; text-align: center; font-size: 1.8rem; padding: 25px; }
        .card-body { padding: 35px; background: white; }
        .form-label { font-weight: 600; color: #4a5568; margin-bottom: 8px; }
        .form-control, .form-select { border-radius: 12px; border: 1.5px solid #e2e8f0; padding: 12px 18px; transition: all 0.3s; }
        .form-control:focus, .form-select:focus { border-color: #4facfe; box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.15); }
        .btn-primary { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); border: none; border-radius: 12px; padding: 14px; font-weight: 700; font-size: 1.1rem; transition: transform 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 172, 254, 0.3); }
        .progress { height: 30px; border-radius: 15px; margin-top: 25px; display: none; background-color: #edf2f7; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #4facfe, #00f2fe); font-weight: bold; }
        #login-section { display: block; }
        #download-section { display: none; }
        .status-info { font-size: 1rem; color: #718096; margin-top: 15px; font-weight: 500; }
        .alert-error { background-color: #fff5f5; border-left: 4px solid #f56565; color: #c53030; padding: 15px; border-radius: 8px; margin-top: 20px; display: none; }
        .server-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; background: #ebf8ff; color: #3182ce; margin-bottom: 15px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登入介面 -->
        <div id="login-section" class="card">
            <div class="card-header">🔒 系統登入</div>
            <div class="card-body">
                <div class="mb-4">
                    <label class="form-label">使用者名稱</label>
                    <input type="text" id="username" class="form-control" placeholder="輸入帳號">
                </div>
                <div class="mb-4">
                    <label class="form-label">密碼</label>
                    <input type="password" id="password" class="form-control" placeholder="輸入密碼">
                </div>
                <button onclick="login()" class="btn btn-primary w-100">登入系統</button>
            </div>
        </div>

        <!-- 下載介面 -->
        <div id="download-section" class="card">
            <div class="card-header">🚀 終極下載器 v2.0</div>
            <div class="card-body">
                <div class="server-badge">伺服器狀態：連線中...</div>
                
                <div class="mb-4">
                    <label class="form-label">後端伺服器 URL (Serveo)</label>
                    <input type="text" id="server-url" class="form-control" placeholder="例如: https://xxxx.serveo.net" value="">
                    <small class="text-muted">提示：程式碼中已可預填，目前為空白供手動輸入或程式填寫。</small>
                </div>

                <div class="mb-4">
                    <label class="form-label">YouTube / YT Music 連結</label>
                    <textarea id="url" class="form-control" rows="3" placeholder="請貼上連結 (支援影片、播放清單、專輯)"></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label">選擇下載模式</label>
                    <select id="mode" class="form-select">
                        <option value="1">🎵 YouTube Music 專輯下載 (自動分資料夾+封面)</option>
                        <option value="2">🎵 YouTube Music 單曲下載 (封面+標籤)</option>
                        <option value="3">🎵 YouTube Music 播放清單下載 (整份清單視為一張專輯)</option>
                        <option value="4">🎬 YouTube 影片 1080p 下載 (音畫同步)</option>
                        <option value="5">🎬 YouTube 影片播放清單下載 (1080p)</option>
                    </select>
                </div>

                <button onclick="startDownload()" id="dl-btn" class="btn btn-primary w-100">開始下載任務</button>

                <div class="progress" id="progress-container">
                    <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%;">0%</div>
                </div>

                <div id="status-info" class="status-info text-center"></div>
                <div id="alert-error" class="alert-error"></div>

                <div id="result-link" class="mt-4 text-center" style="display: none;">
                    <a id="download-btn" class="btn btn-success w-100 py-3 font-weight-bold" style="border-radius: 12px; font-size: 1.2rem; background: #48bb78; border: none;">✅ 下載完成！點擊取得檔案</a>
                </div>
                
                <div class="mt-4 text-center">
                    <a href="#" onclick="getErrorLog()" class="text-muted text-decoration-none small">查看錯誤報告</a>
                </div>
            </div>
        </div>
    </div>

    <script src="users.js"></script>
    <script>
        let currentTaskId = null;
        let pollInterval = null;

        // 登入邏輯
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const validUser = USERS.find(u => u.username === user && u.password === pass);
            
            if (validUser) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('download-section').style.display = 'block';
            } else {
                alert('登入失敗，請檢查帳號密碼');
            }
        }

        // 開始下載
        async function startDownload() {
            const serverUrl = document.getElementById('server-url').value.trim();
            const url = document.getElementById('url').value.trim();
            const mode = document.getElementById('mode').value;

            if (!serverUrl || !url) {
                alert('請填寫伺服器 URL 和 YouTube 連結');
                return;
            }

            // 清除狀態
            document.getElementById('dl-btn').disabled = true;
            document.getElementById('progress-container').style.display = 'flex';
            document.getElementById('progress-bar').style.width = '0%';
            document.getElementById('status-info').innerText = '正在向伺服器提交請求...';
            document.getElementById('result-link').style.display = 'none';
            document.getElementById('alert-error').style.display = 'none';

            try {
                const response = await fetch(`${serverUrl}/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, mode })
                });
                const data = await response.json();
                if (data.task_id) {
                    currentTaskId = data.task_id;
                    startPolling(serverUrl);
                } else {
                    throw new Error(data.error || '啟動任務失敗');
                }
            } catch (error) {
                showError(`無法連接到伺服器: ${error.message}`);
                document.getElementById('dl-btn').disabled = false;
            }
        }

        // 輪詢進度
        function startPolling(serverUrl) {
            if (pollInterval) clearInterval(pollInterval);
            
            pollInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${serverUrl}/status/${currentTaskId}`);
                    const data = await response.json();

                    if (data.status === 'processing' || data.status === 'pending') {
                        const progress = parseFloat(data.progress || 0).toFixed(1);
                        document.getElementById('progress-bar').style.width = `${progress}%`;
                        document.getElementById('progress-bar').innerText = `${progress}%`;
                        document.getElementById('status-info').innerText = `速度: ${data.speed || '---'} | 剩餘時間: ${data.eta || '---'}`;
                    } else if (data.status === 'completed') {
                        clearInterval(pollInterval);
                        document.getElementById('progress-bar').style.width = '100%';
                        document.getElementById('progress-bar').innerText = '100%';
                        document.getElementById('status-info').innerText = '✨ 任務完成！檔案已準備就緒。';
                        
                        const downloadBtn = document.getElementById('download-btn');
                        downloadBtn.href = `${serverUrl}/files/${encodeURIComponent(data.file)}`;
                        downloadBtn.download = data.file;
                        document.getElementById('result-link').style.display = 'block';
                        document.getElementById('dl-btn').disabled = false;
                    } else if (data.status === 'failed') {
                        clearInterval(pollInterval);
                        showError(`下載失敗: ${data.error}`);
                        document.getElementById('dl-btn').disabled = false;
                    }
                } catch (error) {
                    console.error('Polling error:', error);
                }
            }, 1500);
        }

        function showError(msg) {
            const errDiv = document.getElementById('alert-error');
            errDiv.innerText = msg;
            errDiv.style.display = 'block';
            document.getElementById('status-info').innerText = '發生錯誤';
        }

        async function getErrorLog() {
            const serverUrl = document.getElementById('server-url').value.trim();
            if (!serverUrl) return alert('請先填寫伺服器 URL');
            window.open(`${serverUrl}/error_report`, '_blank');
        }
    </script>
</body>
</html>
