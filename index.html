<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termux 影音下載控制中心 v3.2 Stable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --primary: #3b82f6; --primary-dark: #1d4ed8; --bg: #f8fafc; --card-bg: #ffffff; }
        body { background-color: var(--bg); font-family: 'Segoe UI', 'Noto Sans TC', sans-serif; color: #1e293b; }
        .container { max-width: 1000px; margin-top: 30px; margin-bottom: 50px; }
        .nav-pills .nav-link { border-radius: 16px; font-weight: 700; color: #64748b; padding: 14px 28px; transition: all 0.3s; border: 2px solid transparent; }
        .nav-pills .nav-link.active { background: #ffffff; color: var(--primary); border-color: var(--primary); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1); }
        .card { border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: none; overflow: hidden; }
        .card-header { background: #ffffff; border-bottom: 1px solid #f1f5f9; color: #1e293b; font-weight: 800; text-align: center; font-size: 1.6rem; padding: 30px; }
        .card-body { padding: 40px; background: white; }
        .form-label { font-weight: 700; color: #475569; margin-bottom: 10px; }
        .form-control, .form-select { border-radius: 18px; border: 2px solid #f1f5f9; padding: 15px 22px; transition: all 0.3s; background-color: #f8fafc; }
        .form-control:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.05); background-color: white; }
        .btn-primary { background: var(--primary); border: none; border-radius: 18px; padding: 18px; font-weight: 800; font-size: 1.2rem; transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); background: var(--primary-dark); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2); }
        #login-section { display: block; }
        #main-content { display: none; }
        .task-item { border: 2px solid #f1f5f9; border-radius: 26px; padding: 30px; margin-top: 25px; background: white; transition: all 0.3s; }
        .progress { height: 32px; border-radius: 16px; background-color: #f1f5f9; overflow: hidden; margin-top: 20px; }
        .progress-bar { background: linear-gradient(90deg, var(--primary), #8b5cf6); font-weight: 800; }
        .terminal-container { background: #000000; border-radius: 26px; height: 580px; width: 100%; border: none; overflow: hidden; }
        .terminal-iframe { width: 100%; height: 100%; border: none; }
        .status-badge { display: inline-block; padding: 8px 20px; border-radius: 40px; font-size: 0.9rem; font-weight: 700; margin-bottom: 25px; }
        .status-online { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-offline { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登入介面 -->
        <div id="login-section" class="card mx-auto" style="max-width: 480px;">
            <div class="card-header">🔐 雲端控制中心驗證</div>
            <div class="card-body">
                <div class="mb-4">
                    <label class="form-label">管理員帳號</label>
                    <input type="text" id="username" class="form-control" placeholder="輸入帳號">
                </div>
                <div class="mb-4">
                    <label class="form-label">存取密碼</label>
                    <input type="password" id="password" class="form-control" placeholder="輸入密碼">
                </div>
                <button onclick="login()" class="btn btn-primary w-100">立即登入</button>
            </div>
        </div>

        <!-- 主內容介面 -->
        <div id="main-content">
            <div class="d-flex justify-content-center mb-4">
                <ul class="nav nav-pills" id="pills-tab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="pills-download-tab" data-bs-toggle="pill" data-bs-target="#pills-download" type="button" role="tab"><i class="bi bi-cloud-download-fill me-2"></i>下載任務</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="pills-terminal-tab" data-bs-toggle="pill" data-bs-target="#pills-terminal" type="button" role="tab"><i class="bi bi-terminal-fill me-2"></i>遠端控制台</button>
                    </li>
                </ul>
            </div>

            <div class="tab-content" id="pills-tabContent">
                <!-- 下載分頁 -->
                <div class="tab-pane fade show active" id="pills-download" role="tabpanel">
                    <div class="card">
                        <div class="card-header">📥 影音下載管理中心 (v3.2)</div>
                        <div class="card-body">
                            <div id="server-status" class="status-badge status-offline"><i class="bi bi-dot"></i> 正在連線後端...</div>
                            
                            <div class="mb-4">
                                <label class="form-label">伺服器 URL (支援記憶)</label>
                                <input type="text" id="server-url" class="form-control" placeholder="https://xxxx.loclx.io" onchange="saveSettings()">
                            </div>

                            <div class="mb-4">
                                <label class="form-label">影音連結 (支援自動拆分)</label>
                                <textarea id="url" class="form-control" rows="3" placeholder="貼上 YouTube / YT Music 連結..."></textarea>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">下載模式</label>
                                <select id="mode" class="form-select">
                                    <option value="1">🎵 YT Music 專輯 (1:1封面+資料夾)</option>
                                    <option value="2">🎵 YT Music 單曲 (1:1封面+標籤)</option>
                                    <option value="3">🎵 YT Music 播放清單 (視為單一專輯)</option>
                                    <option value="4">🎬 YT 影片 1080p (音畫同步)</option>
                                    <option value="5">🎬 YT 影片播放清單 (1080p)</option>
                                </select>
                            </div>

                            <button onclick="startDownload()" class="btn btn-primary w-100 mb-3">啟動下載任務</button>
                            <div id="tasks-container"></div>
                        </div>
                    </div>
                </div>

                <!-- 終端機分頁 -->
                <div class="tab-pane fade" id="pills-terminal" role="tabpanel">
                    <div class="card">
                        <div class="card-header">💻 Termux 實時控制台</div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label">控制台 URL (支援記憶)</label>
                                <input type="text" id="terminal-url" class="form-control" placeholder="https://xxxx-term.loclx.io" onchange="saveSettings()">
                            </div>
                            <button onclick="connectTerminal()" class="btn btn-dark w-100 mb-4"><i class="bi bi-plug-fill me-2"></i>連接控制台</button>
                            
                            <div class="terminal-container">
                                <iframe id="terminal-frame" class="terminal-iframe" src="about:blank"></iframe>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="users.js"></script>
    <script>
        window.onload = function() {
            const savedServer = localStorage.getItem('yt_dlp_server');
            const savedTerminal = localStorage.getItem('yt_dlp_terminal');
            if (savedServer) {
                document.getElementById('server-url').value = savedServer;
                checkServerStatus();
            }
            if (savedTerminal) document.getElementById('terminal-url').value = savedTerminal;
        };

        function saveSettings() {
            const server = document.getElementById('server-url').value.trim();
            const terminal = document.getElementById('terminal-url').value.trim();
            localStorage.setItem('yt_dlp_server', server);
            localStorage.setItem('yt_dlp_terminal', terminal);
            if (server) checkServerStatus();
        }

        async function checkServerStatus() {
            const serverUrl = document.getElementById('server-url').value.trim();
            const badge = document.getElementById('server-status');
            if (!serverUrl) return;
            try {
                const res = await fetch(`${serverUrl}/health`);
                const data = await res.json();
                if (data.status === 'online') {
                    badge.className = 'status-badge status-online';
                    badge.innerHTML = `<i class="bi bi-check-circle-fill me-1"></i> 系統在線 (${data.version})`;
                }
            } catch (e) {
                badge.className = 'status-badge status-offline';
                badge.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-1"></i> 系統離線`;
            }
        }

        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const validUser = USERS.find(u => u.username === user && u.password === pass);
            if (validUser) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else { alert('驗證失敗'); }
        }

        function connectTerminal() {
            const url = document.getElementById('terminal-url').value.trim();
            if (url) { document.getElementById('terminal-frame').src = url; saveSettings(); }
        }

        async function startDownload() {
            const serverUrl = document.getElementById('server-url').value.trim();
            const url = document.getElementById('url').value.trim();
            const mode = document.getElementById('mode').value;
            if (!serverUrl || !url) { alert('資訊不完整'); return; }

            try {
                const response = await fetch(`${serverUrl}/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, mode })
                });
                const data = await response.json();
                if (data.task_ids) {
                    data.task_ids.forEach(id => createTaskUI(id, serverUrl));
                    document.getElementById('url').value = '';
                }
            } catch (e) { alert('連線失敗: ' + e.message); }
        }

        function createTaskUI(taskId, serverUrl) {
            const container = document.getElementById('tasks-container');
            const taskDiv = document.createElement('div');
            taskDiv.className = 'task-item';
            taskDiv.id = `task-${taskId}`;
            taskDiv.innerHTML = `
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <strong class="text-truncate" style="max-width: 70%;">任務: ${taskId}</strong>
                    <span id="badge-${taskId}" class="badge bg-secondary rounded-pill px-3 py-2">等待中</span>
                </div>
                <div class="progress">
                    <div id="bar-${taskId}" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%;">0%</div>
                </div>
                <div id="info-${taskId}" class="status-text text-center">同步處理中...</div>
                <div id="result-${taskId}" class="mt-4" style="display: none;">
                    <a id="btn-${taskId}" class="btn btn-success w-100" style="background: #10b981; border: none; border-radius: 16px; font-weight: 800; padding: 15px;">🎁 下載檔案</a>
                </div>
            `;
            container.prepend(taskDiv);
            startPolling(taskId, serverUrl);
        }

        function startPolling(taskId, serverUrl) {
            const pollInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${serverUrl}/status/${taskId}`);
                    const data = await response.json();
                    const bar = document.getElementById(`bar-${taskId}`);
                    const info = document.getElementById(`info-${taskId}`);
                    const badge = document.getElementById(`badge-${taskId}`);

                    if (data.status === 'processing') {
                        const p = parseFloat(data.progress || 0).toFixed(1);
                        bar.style.width = p + '%'; bar.innerText = p + '%';
                        info.innerText = `⚡ ${data.speed || '--'} | ⏳ ${data.eta || '--'}`;
                        badge.className = 'badge bg-primary rounded-pill px-3 py-2'; badge.innerText = '下載中';
                    } else if (data.status === 'completed') {
                        clearInterval(pollInterval);
                        bar.style.width = '100%'; bar.innerText = '100%';
                        info.innerText = '✅ 完成！';
                        badge.className = 'badge bg-success rounded-pill px-3 py-2';
                        document.getElementById(`result-${taskId}`).style.display = 'block';
                        document.getElementById(`btn-${taskId}`).href = `${serverUrl}/files/${encodeURIComponent(data.file)}`;
                    } else if (data.status === 'failed') {
                        clearInterval(pollInterval);
                        info.innerText = '❌ 失敗: ' + (data.error || '未知錯誤');
                        badge.className = 'badge bg-danger rounded-pill px-3 py-2';
                    }
                } catch (e) {}
            }, 2000);
        }
    </script>
</body>
</html>
