<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termux yt-dlp 終極下載器</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { max-width: 800px; margin-top: 50px; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: none; }
        .card-header { background: linear-gradient(135deg, #007bff, #6610f2); color: white; border-radius: 15px 15px 0 0 !important; font-weight: bold; text-align: center; font-size: 1.5rem; }
        .btn-primary { background: linear-gradient(135deg, #007bff, #0056b3); border: none; }
        .progress { height: 25px; border-radius: 12px; margin-top: 20px; display: none; }
        #login-section { display: block; }
        #download-section { display: none; }
        .status-info { font-size: 0.9rem; color: #6c757d; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登入介面 -->
        <div id="login-section" class="card">
            <div class="card-header">🔒 系統登入</div>
            <div class="card-body p-4">
                <div class="mb-3">
                    <label class="form-label">使用者名稱</label>
                    <input type="text" id="username" class="form-control" placeholder="請輸入使用者名稱">
                </div>
                <div class="mb-3">
                    <label class="form-label">密碼</label>
                    <input type="password" id="password" class="form-control" placeholder="請輸入密碼">
                </div>
                <button onclick="login()" class="btn btn-primary w-100">登入</button>
            </div>
        </div>

        <!-- 下載介面 -->
        <div id="download-section" class="card">
            <div class="card-header">🚀 終極下載器</div>
            <div class="card-body p-4">
                <div class="mb-3">
                    <label class="form-label">後端伺服器 URL (Serveo)</label>
                    <input type="text" id="server-url" class="form-control" placeholder="例如: https://xxxx.serveo.net">
                </div>
                <div class="mb-3">
                    <label class="form-label">YouTube / YT Music 連結</label>
                    <textarea id="url" class="form-control" rows="3" placeholder="請貼上連結，多個連結請換行"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">選擇下載模式</label>
                    <select id="mode" class="form-select">
                        <option value="1">1. YouTube Music 專輯下載 (自動分資料夾+封面)</option>
                        <option value="2">2. YouTube Music 單曲下載 (封面+標籤)</option>
                        <option value="3">3. YouTube Music 播放清單下載 (整份清單視為一張專輯)</option>
                        <option value="4">4. YouTube 影片 1080p 下載 (音畫同步)</option>
                        <option value="5">5. YouTube 影片播放清單下載 (1080p)</option>
                    </select>
                </div>
                <button onclick="startDownload()" id="dl-btn" class="btn btn-primary w-100">開始下載</button>

                <div class="progress" id="progress-container">
                    <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%;">0%</div>
                </div>
                <div id="status-info" class="status-info text-center"></div>
                <div id="result-link" class="mt-3 text-center" style="display: none;">
                    <a id="download-btn" class="btn btn-success w-100">✅ 下載完成！點擊取得檔案</a>
                </div>
            </div>
        </div>
    </div>

    <script src="users.js"></script>
    <script>
        let currentTaskId = null;
        let pollInterval = null;

        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const validUser = USERS.find(u => u.username === user && u.password === pass);
            
            if (validUser) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('download-section').style.display = 'block';
            } else {
                alert('登入失敗，請檢查帳號密碼');
            }
        }

        async function startDownload() {
            const serverUrl = document.getElementById('server-url').value.trim();
            const url = document.getElementById('url').value.trim();
            const mode = document.getElementById('mode').value;

            if (!serverUrl || !url) {
                alert('請填寫伺ire URL 和 YouTube 連結');
                return;
            }

            document.getElementById('dl-btn').disabled = true;
            document.getElementById('progress-container').style.display = 'flex';
            document.getElementById('status-info').innerText = '正在初始化任務...';
            document.getElementById('result-link').style.display = 'none';

            try {
                const response = await fetch(`${serverUrl}/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, mode })
                });
                const data = await response.json();
                currentTaskId = data.task_id;
                startPolling(serverUrl);
            } catch (error) {
                alert('無法連接到後端伺服器，請確認 URL 是否正確且伺服器已啟動');
                document.getElementById('dl-btn').disabled = false;
            }
        }

        function startPolling(serverUrl) {
            pollInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${serverUrl}/status/${currentTaskId}`);
                    const data = await response.json();

                    if (data.status === 'processing') {
                        const progress = data.progress || 0;
                        document.getElementById('progress-bar').style.width = `${progress}%`;
                        document.getElementById('progress-bar').innerText = `${progress}%`;
                        document.getElementById('status-info').innerText = `速度: ${data.speed} | 剩餘時間: ${data.eta}`;
                    } else if (data.status === 'completed') {
                        clearInterval(pollInterval);
                        document.getElementById('progress-bar').style.width = '100%';
                        document.getElementById('progress-bar').innerText = '100%';
                        document.getElementById('status-info').innerText = '任務完成！';
                        
                        const downloadBtn = document.getElementById('download-btn');
                        downloadBtn.href = `${serverUrl}/files/${data.file}`;
                        downloadBtn.download = data.file;
                        document.getElementById('result-link').style.display = 'block';
                        document.getElementById('dl-btn').disabled = false;
                    } else if (data.status === 'failed') {
                        clearInterval(pollInterval);
                        alert(`下載失敗: ${data.error}`);
                        document.getElementById('dl-btn').disabled = false;
                    }
                } catch (error) {
                    console.error('Polling error:', error);
                }
            }, 2000);
        }
    </script>
</body>
</html>
