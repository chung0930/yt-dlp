<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termux yt-dlp 終極下載器 v2.6 Ultimate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: 'Segoe UI', 'Noto Sans TC', sans-serif; }
        .container { max-width: 900px; margin-top: 40px; margin-bottom: 40px; }
        .card { border-radius: 28px; box-shadow: 0 25px 50px rgba(0,0,0,0.1); border: none; overflow: hidden; }
        .card-header { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; border: none; font-weight: 800; text-align: center; font-size: 1.8rem; padding: 30px; }
        .card-body { padding: 40px; background: white; }
        .form-label { font-weight: 700; color: #1e293b; margin-bottom: 10px; }
        .form-control, .form-select { border-radius: 16px; border: 2px solid #e2e8f0; padding: 15px 22px; transition: all 0.3s; background-color: #f8fafc; }
        .form-control:focus, .form-select:focus { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); background-color: white; }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); border: none; border-radius: 16px; padding: 18px; font-weight: 800; font-size: 1.2rem; transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(99, 102, 241, 0.3); }
        #login-section { display: block; }
        #download-section { display: none; }
        .task-item { border: 2px solid #f1f5f9; border-radius: 24px; padding: 30px; margin-top: 30px; background: white; transition: all 0.3s; }
        .progress { height: 32px; border-radius: 16px; background-color: #f1f5f9; overflow: hidden; margin-top: 20px; }
        .progress-bar { background: linear-gradient(90deg, #6366f1, #a855f7); font-weight: 800; font-size: 1rem; }
        .status-text { font-size: 1rem; color: #64748b; margin-top: 15px; font-weight: 600; }
        .error-detail { background: #fff1f2; border: 1px solid #ffe4e6; border-radius: 14px; padding: 20px; margin-top: 20px; font-family: monospace; font-size: 0.9rem; color: #be123c; text-align: left; white-space: pre-wrap; word-break: break-all; }
        .server-badge { display: inline-block; padding: 8px 20px; border-radius: 40px; font-size: 0.9rem; background: #f0fdf4; color: #166534; margin-bottom: 25px; font-weight: 700; border: 1px solid #dcfce7; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登入介面 -->
        <div id="login-section" class="card">
            <div class="card-header">🔒 系統安全登入</div>
            <div class="card-body">
                <div class="mb-4">
                    <label class="form-label">使用者名稱</label>
                    <input type="text" id="username" class="form-control" placeholder="輸入您的帳號">
                </div>
                <div class="mb-4">
                    <label class="form-label">密碼</label>
                    <input type="password" id="password" class="form-control" placeholder="輸入您的密碼">
                </div>
                <button onclick="login()" class="btn btn-primary w-100">進入系統</button>
            </div>
        </div>

        <!-- 下載介面 -->
        <div id="download-section" class="card">
            <div class="card-header">🚀 終極下載器 v2.6 Ultimate</div>
            <div class="card-body">
                <div class="server-badge">✨ 系統狀態：檔案系統路徑優化完成</div>
                
                <div class="mb-4">
                    <label class="form-label">後端伺服器 URL (Serveo)</label>
                    <input type="text" id="server-url" class="form-control" placeholder="https://xxxx.serveo.net" value="">
                </div>

                <div class="mb-4">
                    <label class="form-label">YouTube / YT Music 連結 (支援批次自動拆分)</label>
                    <textarea id="url" class="form-control" rows="4" placeholder="貼上網址，系統會自動在 https:// 處拆分"></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label">選擇下載模式</label>
                    <select id="mode" class="form-select">
                        <option value="1">🎵 YT Music 專輯下載 (資料夾+1:1封面)</option>
                        <option value="2">🎵 YT Music 單曲下載 (1:1封面+標籤)</option>
                        <option value="3">🎵 YT Music 播放清單下載 (視為單一專輯)</option>
                        <option value="4">🎬 YT 影片 1080p 下載 (音畫同步)</option>
                        <option value="5">🎬 YT 影片播放清單下載 (1080p)</option>
                    </select>
                </div>

                <button onclick="startDownload()" id="dl-btn" class="btn btn-primary w-100">啟動終極批次下載</button>

                <div id="tasks-container"></div>
                
                <div class="mt-4 text-center">
                    <a href="#" onclick="getErrorLog()" class="text-muted text-decoration-none small">查看系統診斷日誌</a>
                </div>
            </div>
        </div>
    </div>

    <script src="users.js"></script>
    <script>
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const validUser = USERS.find(u => u.username === user && u.password === pass);
            if (validUser) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('download-section').style.display = 'block';
            } else {
                alert('登入失敗，請確認帳號密碼');
            }
        }

        async function startDownload() {
            const serverUrl = document.getElementById('server-url').value.trim();
            const url = document.getElementById('url').value.trim();
            const mode = document.getElementById('mode').value;

            if (!serverUrl || !url) {
                alert('請填寫完整資訊');
                return;
            }

            try {
                const response = await fetch(`${serverUrl}/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, mode })
                });
                const data = await response.json();
                if (data.task_ids) {
                    data.task_ids.forEach(id => createTaskUI(id, serverUrl));
                    document.getElementById('url').value = '';
                } else {
                    alert(data.error || '啟動失敗');
                }
            } catch (error) {
                alert(`連線伺服器失敗，請確認 Serveo 是否已斷開`);
            }
        }

        function createTaskUI(taskId, serverUrl) {
            const container = document.getElementById('tasks-container');
            const taskDiv = document.createElement('div');
            taskDiv.className = 'task-item';
            taskDiv.id = `task-${taskId}`;
            taskDiv.innerHTML = `
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <strong class="text-truncate" style="max-width: 75%; font-size: 1.1rem;">任務 ID: ${taskId}</strong>
                    <span id="badge-${taskId}" class="badge bg-secondary rounded-pill px-3 py-2">等待中</span>
                </div>
                <div class="progress">
                    <div id="bar-${taskId}" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%;">0%</div>
                </div>
                <div id="info-${taskId}" class="status-text text-center">正在安全解析...</div>
                <div id="error-container-${taskId}" class="error-detail" style="display: none;"></div>
                <div id="result-${taskId}" class="mt-4" style="display: none;">
                    <a id="btn-${taskId}" class="btn btn-success w-100" style="background: #10b981; border: none; border-radius: 14px; font-weight: 800; padding: 14px;">🎁 領取檔案 (下載完成)</a>
                </div>
            `;
            container.prepend(taskDiv);
            startPolling(taskId, serverUrl);
        }

        function startPolling(taskId, serverUrl) {
            const pollInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${serverUrl}/status/${taskId}`);
                    const data = await response.json();

                    const bar = document.getElementById(`bar-${taskId}`);
                    const info = document.getElementById(`info-${taskId}`);
                    const badge = document.getElementById(`badge-${taskId}`);
                    const errContainer = document.getElementById(`error-container-${taskId}`);

                    if (data.status === 'processing') {
                        const progress = parseFloat(data.progress || 0).toFixed(1);
                        bar.style.width = `${progress}%`;
                        bar.innerText = `${progress}%`;
                        info.innerText = `⚡ 速度: ${data.speed || '---'} | ⏳ 剩餘: ${data.eta || '---'}`;
                        badge.className = 'badge bg-primary rounded-pill px-3 py-2';
                        badge.innerText = '下載中';
                    } else if (data.status === 'completed') {
                        clearInterval(pollInterval);
                        bar.style.width = '100%';
                        bar.innerText = '100%';
                        info.innerText = '✅ 任務圓滿完成！';
                        badge.className = 'badge bg-success rounded-pill px-3 py-2';
                        badge.innerText = '已完成';
                        document.getElementById(`result-${taskId}`).style.display = 'block';
                        const dlBtn = document.getElementById(`btn-${taskId}`);
                        dlBtn.href = `${serverUrl}/files/${encodeURIComponent(data.file)}`;
                        dlBtn.download = data.file;
                    } else if (data.status === 'failed') {
                        clearInterval(pollInterval);
                        info.innerText = `❌ 下載遇到阻礙`;
                        badge.className = 'badge bg-danger rounded-pill px-3 py-2';
                        badge.innerText = '失敗';
                        errContainer.style.display = 'block';
                        errContainer.innerText = `診斷資訊：\n${data.error}`;
                    }
                } catch (e) { console.error("Polling error:", e); }
            }, 2000);
        }

        function getErrorLog() {
            const serverUrl = document.getElementById('server-url').value.trim();
            if (serverUrl) window.open(`${serverUrl}/error_report`, '_blank');
        }
    </script>
</body>
</html>
