<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termux yt-dlp 終極下載器 v2.3 Final</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', 'Noto Sans TC', sans-serif; }
        .container { max-width: 900px; margin-top: 40px; margin-bottom: 40px; }
        .card { border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.06); border: none; overflow: hidden; }
        .card-header { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: white; border: none; font-weight: 800; text-align: center; font-size: 1.8rem; padding: 30px; }
        .card-body { padding: 40px; background: white; }
        .form-label { font-weight: 700; color: #334155; margin-bottom: 10px; }
        .form-control, .form-select { border-radius: 14px; border: 2px solid #f1f5f9; padding: 14px 20px; transition: all 0.3s; background-color: #f8fafc; }
        .form-control:focus, .form-select:focus { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); background-color: white; }
        .btn-primary { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); border: none; border-radius: 14px; padding: 16px; font-weight: 800; font-size: 1.1rem; transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3); }
        #login-section { display: block; }
        #download-section { display: none; }
        .task-item { border: 2px solid #f1f5f9; border-radius: 20px; padding: 25px; margin-top: 25px; background: white; transition: all 0.3s; }
        .task-item:hover { border-color: #e2e8f0; transform: scale(1.01); }
        .progress { height: 28px; border-radius: 14px; background-color: #f1f5f9; overflow: hidden; margin-top: 15px; }
        .progress-bar { background: linear-gradient(90deg, #4f46e5, #7c3aed); font-weight: 800; }
        .status-text { font-size: 0.95rem; color: #64748b; margin-top: 12px; font-weight: 600; }
        .server-badge { display: inline-block; padding: 6px 16px; border-radius: 30px; font-size: 0.85rem; background: #e0e7ff; color: #4338ca; margin-bottom: 20px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登入介面 -->
        <div id="login-section" class="card">
            <div class="card-header">🔒 系統登入</div>
            <div class="card-body">
                <div class="mb-4">
                    <label class="form-label">使用者名稱</label>
                    <input type="text" id="username" class="form-control" placeholder="輸入帳號">
                </div>
                <div class="mb-4">
                    <label class="form-label">密碼</label>
                    <input type="password" id="password" class="form-control" placeholder="輸入密碼">
                </div>
                <button onclick="login()" class="btn btn-primary w-100">立即登入</button>
            </div>
        </div>

        <!-- 下載介面 -->
        <div id="download-section" class="card">
            <div class="card-header">🚀 終極下載器 v2.3 Final</div>
            <div class="card-body">
                <div class="server-badge">伺服器狀態：準備就緒</div>
                
                <div class="mb-4">
                    <label class="form-label">後端伺服器 URL (Serveo)</label>
                    <input type="text" id="server-url" class="form-control" placeholder="https://xxxx.serveo.net" value="">
                </div>

                <div class="mb-4">
                    <label class="form-label">YouTube / YT Music 連結 (支援自動拆分)</label>
                    <textarea id="url" class="form-control" rows="4" placeholder="貼上一個或多個網址，系統會自動在 https:// 處拆分"></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label">選擇下載模式</label>
                    <select id="mode" class="form-select">
                        <option value="1">🎵 YT Music 專輯下載 (資料夾+1:1封面)</option>
                        <option value="2">🎵 YT Music 單曲下載 (1:1封面+標籤)</option>
                        <option value="3">🎵 YT Music 播放清單下載 (視為單一專輯)</option>
                        <option value="4">🎬 YT 影片 1080p 下載 (音畫同步)</option>
                        <option value="5">🎬 YT 影片播放清單下載 (1080p)</option>
                    </select>
                </div>

                <button onclick="startDownload()" id="dl-btn" class="btn btn-primary w-100">啟動批次下載</button>

                <!-- 任務清單 -->
                <div id="tasks-container"></div>
                
                <div class="mt-4 text-center">
                    <a href="#" onclick="getErrorLog()" class="text-muted text-decoration-none small">查看系統錯誤日誌</a>
                </div>
            </div>
        </div>
    </div>

    <script src="users.js"></script>
    <script>
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const validUser = USERS.find(u => u.username === user && u.password === pass);
            if (validUser) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('download-section').style.display = 'block';
            } else {
                alert('登入失敗，請檢查帳號密碼');
            }
        }

        async function startDownload() {
            const serverUrl = document.getElementById('server-url').value.trim();
            const url = document.getElementById('url').value.trim();
            const mode = document.getElementById('mode').value;

            if (!serverUrl || !url) {
                alert('請填寫完整資訊');
                return;
            }

            try {
                const response = await fetch(`${serverUrl}/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, mode })
                });
                const data = await response.json();
                if (data.task_ids) {
                    data.task_ids.forEach(id => createTaskUI(id, serverUrl));
                    document.getElementById('url').value = '';
                } else {
                    alert(data.error || '啟動失敗');
                }
            } catch (error) {
                alert(`連線伺服器失敗，請檢查 URL 是否正確或 Serveo 是否已斷開`);
            }
        }

        function createTaskUI(taskId, serverUrl) {
            const container = document.getElementById('tasks-container');
            const taskDiv = document.createElement('div');
            taskDiv.className = 'task-item';
            taskDiv.id = `task-${taskId}`;
            taskDiv.innerHTML = `
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <strong class="text-truncate" style="max-width: 70%;">任務: ${taskId}</strong>
                    <span id="badge-${taskId}" class="badge bg-secondary">等待中</span>
                </div>
                <div class="progress">
                    <div id="bar-${taskId}" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%;">0%</div>
                </div>
                <div id="info-${taskId}" class="status-text text-center">正在解析...</div>
                <div id="result-${taskId}" class="mt-3" style="display: none;">
                    <a id="btn-${taskId}" class="btn btn-success w-100" style="background: #10b981; border: none; border-radius: 12px; font-weight: 800;">🎁 點擊下載檔案</a>
                </div>
            `;
            container.prepend(taskDiv);
            startPolling(taskId, serverUrl);
        }

        function startPolling(taskId, serverUrl) {
            const pollInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${serverUrl}/status/${taskId}`);
                    const data = await response.json();

                    const bar = document.getElementById(`bar-${taskId}`);
                    const info = document.getElementById(`info-${taskId}`);
                    const badge = document.getElementById(`badge-${taskId}`);

                    if (data.status === 'processing') {
                        const progress = parseFloat(data.progress || 0).toFixed(1);
                        bar.style.width = `${progress}%`;
                        bar.innerText = `${progress}%`;
                        info.innerText = `⚡ 速度: ${data.speed || '---'} | ⏳ 剩餘: ${data.eta || '---'}`;
                        badge.className = 'badge bg-primary';
                        badge.innerText = '下載中';
                    } else if (data.status === 'completed') {
                        clearInterval(pollInterval);
                        bar.style.width = '100%';
                        bar.innerText = '100%';
                        info.innerText = '✅ 下載完成！檔案已準備好。';
                        badge.className = 'badge bg-success';
                        badge.innerText = '已完成';
                        
                        const resultDiv = document.getElementById(`result-${taskId}`);
                        const dlBtn = document.getElementById(`btn-${taskId}`);
                        dlBtn.href = `${serverUrl}/files/${encodeURIComponent(data.file)}`;
                        dlBtn.download = data.file;
                        resultDiv.style.display = 'block';
                    } else if (data.status === 'failed') {
                        clearInterval(pollInterval);
                        info.innerText = `❌ 失敗: ${data.error}`;
                        badge.className = 'badge bg-danger';
                        badge.innerText = '失敗';
                    }
                } catch (e) { 
                    console.error("Polling error:", e);
                }
            }, 2000);
        }

        function getErrorLog() {
            const serverUrl = document.getElementById('server-url').value.trim();
            if (serverUrl) window.open(`${serverUrl}/error_report`, '_blank');
        }
    </script>
</body>
</html>
